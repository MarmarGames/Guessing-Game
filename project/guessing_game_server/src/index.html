<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Guessing Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container { max-width: 480px; width: 100%; }

    .header { margin-bottom: 1.5rem; }
    .header .label { font-size: 13px; color: #888; margin-bottom: 4px; }
    .header h1 { font-size: 22px; font-weight: 500; }
    .header .sub { font-size: 14px; color: #888; margin-top: 4px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .stat { background: #ebebeb; border-radius: 8px; padding: 12px 16px; }
    .stat .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat .stat-value { font-size: 22px; font-weight: 500; }

    .hint-box {
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hint-box p { font-size: 15px; color: #888; text-align: center; }
    .hint-box p.low  { color: #185fa5; }
    .hint-box p.high { color: #a32d2d; }
    .hint-box p.win  { color: #0f6e56; }
    .hint-box p.error { color: #ba7517; }

    .history-wrap { margin-bottom: 1.5rem; display: none; }
    .history-label { font-size: 12px; color: #888; margin-bottom: 8px; }
    .history { display: flex; flex-wrap: wrap; gap: 6px; }

    .chip { font-size: 13px; font-weight: 500; padding: 3px 10px; border-radius: 999px; }
    .chip.low  { background: #e6f1fb; color: #185fa5; }
    .chip.high { background: #fcebeb; color: #a32d2d; }
    .chip.win  { background: #e1f5ee; color: #0f6e56; }

    .input-row { display: flex; gap: 8px; }

    input[type="number"] {
      flex: 1;
      height: 40px;
      padding: 0 12px;
      font-size: 15px;
      border-radius: 8px;
      border: 0.5px solid #ccc;
      background: #fff;
      color: #1a1a1a;
      outline: none;
    }
    input[type="number"]:focus { border-color: #999; }

    button.guess-btn {
      height: 40px;
      padding: 0 20px;
      font-size: 14px;
      border-radius: 8px;
      border: 0.5px solid #ccc;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
    }
    button.guess-btn:hover { background: #f0f0f0; }
    button.guess-btn:disabled { opacity: 0.4; cursor: default; }

    .new-game-wrap { margin-top: 12px; text-align: right; }
    .new-game-wrap button {
      font-size: 13px; color: #888; background: none;
      border: none; cursor: pointer; text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <p class="label">Rust Number Guesser</p>
      <h1>Guess the number</h1>
      <p class="sub">Between 1 and 1000</p>
    </div>

    <div class="stats">
      <div class="stat">
        <p class="stat-label">Attempts</p>
        <p class="stat-value" id="attempts">0</p>
      </div>
      <div class="stat">
        <p class="stat-label">Range low</p>
        <p class="stat-value" id="range-low">1</p>
      </div>
      <div class="stat">
        <p class="stat-label">Range high</p>
        <p class="stat-value" id="range-high">1000</p>
      </div>
    </div>

    <div class="hint-box">
      <p id="hint">Enter your first guess below</p>
    </div>

    <div class="history-wrap" id="history-wrap">
      <p class="history-label">Guess history</p>
      <div class="history" id="history"></div>
    </div>

    <div class="input-row">
      <input id="guess-input" type="number" min="1" max="1000" placeholder="Enter a number…" />
      <button class="guess-btn" id="guess-btn" onclick="makeGuess()">Guess</button>
    </div>

    <div class="new-game-wrap">
      <button onclick="newGame()">New game</button>
    </div>
  </div>

  <script>
    let gameId = null;

    async function newGame() {
      const res = await fetch('/api/new', { method: 'POST' });
      const data = await res.json();
      gameId = data.game_id;

      document.getElementById('attempts').textContent = 0;
      document.getElementById('range-low').textContent = 1;
      document.getElementById('range-high').textContent = 1000;

      const hint = document.getElementById('hint');
      hint.textContent = 'Enter your first guess below';
      hint.className = '';

      document.getElementById('history').innerHTML = '';
      document.getElementById('history-wrap').style.display = 'none';
      document.getElementById('guess-input').value = '';
      document.getElementById('guess-input').disabled = false;
      document.getElementById('guess-btn').disabled = false;
      document.getElementById('guess-input').focus();
    }

    async function makeGuess() {
      if (!gameId) return;
      const input = document.getElementById('guess-input');
      const val = parseInt(input.value, 10);

      const hint = document.getElementById('hint');

      if (isNaN(val) || val < 1 || val > 1000) {
        hint.textContent = 'Please enter a number between 1 and 1000.';
        hint.className = 'error';
        return;
      }

      const res = await fetch('/api/guess', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ game_id: gameId, guess: val }),
      });

      const data = await res.json();

      document.getElementById('attempts').textContent = data.attempts;
      document.getElementById('range-low').textContent = data.low;
      document.getElementById('range-high').textContent = data.high;

      hint.textContent = data.message;
      hint.className = data.result;

      if (data.result !== 'error') {
        const histWrap = document.getElementById('history-wrap');
        const hist = document.getElementById('history');
        histWrap.style.display = 'block';

        const chip = document.createElement('span');
        chip.textContent = val;
        chip.className = `chip ${data.result === 'win' ? 'win' : data.result}`;
        hist.appendChild(chip);
      }

      if (data.won) {
        document.getElementById('guess-input').disabled = true;
        document.getElementById('guess-btn').disabled = true;
      }

      input.value = '';
      input.focus();
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('guess-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') makeGuess();
      });
      newGame();
    });
  </script>
</body>
</html>
